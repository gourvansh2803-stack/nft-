<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFTradex - Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="bg-gray-950 text-white p-4">
    <div id="app" class="max-w-md mx-auto">
        <h1 class="text-xl font-black text-center mb-4">NFTradex Core</h1>
        <div id="status" class="bg-blue-900 p-2 text-[10px] rounded mb-4 text-center">Status: Initializing...</div>
        <div id="content" class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
            <button onclick="init()" class="w-full bg-blue-600 p-4 rounded-xl font-bold">Connect Wallet</button>
        </div>
    </div>

<script>
    const ADDR = "0xa1e4A5d66fc0326C16CD54C2348d5fAEBeBa049a";
    const ABI = ["function getMarketQueue() view returns (uint256[])", "function nfts(uint256) view returns (uint256, address, uint256, uint256, bool, bool, bool)"];
    
    function log(msg) { document.getElementById('status').innerText = msg; }

    async function init() {
        try {
            log("Connecting to MetaMask...");
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(ADDR, ABI, signer);
            log("Fetching Market...");
            
            const queue = await contract.getMarketQueue();
            let html = '<h2 class="font-bold mb-3">Market Assets</h2>';
            
            if(queue.length === 0) html += "<p class='text-xs'>Market is empty.</p>";
            
            for(let id of queue) {
                const n = await contract.nfts(id);
                html += `<div class="bg-black p-3 rounded mb-2 flex justify-between items-center">
                    <span>NFT #${n[0].toString()}</span>
                    <span class="text-xs text-yellow-400">${ethers.formatEther(n[2])} USDT</span>
                </div>`;
            }
            document.getElementById('content').innerHTML = html;
            log("Market Loaded Successfully!");
        } catch(e) {
            log("ERROR: " + e.message);
            console.error(e);
        }
    }
</script>
</body>
</html>
